services:
  web:
    build: .
    ports:
      # map host port 8000 → container port 5000 (Gunicorn runs on 5000 inside container). 
      # Only needed for macOS, as MacOS/ControlCenter runs on port 5000 and so can't be 
      # used for the container. On linux can be left with more usual "5000:5000"
      - "8000:5000"  
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/cocdb

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
