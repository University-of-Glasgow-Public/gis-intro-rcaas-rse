<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
    <div id="map" style="width: 100vw; height: 100vh;"></div>
    <script>
	    const map = L.map('map').setView([57.3, -5], 6);
	    const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		    maxZoom: 19,
		    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	    }).addTo(map);
        var marker = {};
	    function onMapClick(e) {
            if (marker != undefined) {
                map.removeLayer(marker);
            };
            marker = new L.Marker(e.latlng);       
            map.addLayer(marker);
            document.getElementById('latitude').value = e.latlng.lat;
            document.getElementById('longitude').value = e.latlng.lng;
	    }
        map.on('click', onMapClick);
    </script>
    <h2>Add New Bothy</h2>
    <form action = "http://127.0.0.1:5000/addbothy" method = "POST"> 
        <p>Name <input type = "text" name = "Name" /></p> 
        <p>Longitude <input type = "text" id="longitude" name = "Longitude" value=""/> Latitude <input type = "text" id="latitude" name = "Latitude" /></p> 
        <p><input type = "submit" value = "submit" /></p> 
    </form> 
</body>
</html>
