{% extends "base.html" %}
{% block title %}Bothies and Sites Map{% endblock %}
{% block content %}

<div id="map"></div>
<script>
	const map = L.map('map').setView([57.3, -5], 6);
	const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);
	function onEachFeature(feature, layer) {
		var content = '<p>Details:</p>';
		if (feature.properties && feature.properties.name) {
			content += '<p>name: ' + feature.properties.name + '</p>';
		}
		layer.bindPopup(content);
	}
	const CustomIcon = L.Icon.extend({
		options: {
			iconSize: [38, 95],
			iconAnchor: [22, 94],
			popupAnchor: [-3, -76]
		}
	});
	var customIcon = L.icon({
		iconUrl: '{{ url_for('static', filename='images/red_marker.png')}}',
		iconSize: [14, 25], // size of the icon
		iconAnchor: [7, 25], // point of the icon which will correspond to marker's location
		popupAnchor: [-3, -76] // point from which the popup should open relative to the iconAnchor
	});
	var longitude = {{ longitude }};
	var latitude = {{ latitude }};
	var radius = {{ radius }};
	const circle = L.circle([latitude, longitude], {
		color: 'red',
		fillColor: '#f03',
		fillOpacity: 0.2,
		radius: radius
	}).addTo(map);
	var sites = {{ sites| tojson }};
	const siteLayer = L.geoJSON(sites, {
		onEachFeature,
		style: function (feature) {
			return {
				color: '#003865',
				fillColor: '#2694d9',
				fillOpacity: 0.1,
				weight: 2
			};
		}
	}).addTo(map);
	var geojson = {{ data| tojson }};
	const bothyLayer = L.geoJSON(geojson, {
		onEachFeature,
		pointToLayer(feature, latlng) {
			return L.marker(latlng, {
				icon: customIcon,
				alt: feature.properties.name
			});
		}
	}).addTo(map);	
</script>

{% endblock content %}
