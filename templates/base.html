<!DOCTYPE html>
<html lang="en">

<head>
    <title>{% block title %}{% endblock %} - GIS-INTRO-RCAAS-RSE</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="/static/css/main.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body class="d-flex flex-column">
    <header>
        <nav class="navbar navbar-expand-lg bg-blue fixed-top">
            <div class="container-fluid">
                <div class="navbar-header">
                    <a class="navbar-brand mr-4" href="https://www.gla.ac.uk/">
                        <img src="/static/images/UoG_keyline.png" width="194.1"
                            height="60.3" alt="Link to University of Glasgow homepage">
                    </a>
                </div>
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('results') }}">View All
                            Bothies</a>
                    </li>
                    <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('search') }}">Search
                            Bothies</a>
                    </li>
                    <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('bothyform') }}">Add Bothy</a>
                    </li>
                    <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('siteform') }}">Add
                            Site</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>
    <main role="main" class="container mt-5 pt-4">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
