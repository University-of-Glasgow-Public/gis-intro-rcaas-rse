<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
    <div id="map" style="width: 100vw; height: 100vh;"></div>
    <script>
	const map = L.map('map').setView([57.3, -5], 6);
	const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);
    var marker = {};
    var lat = "";
    var lng = "";
	function onMapClick(e) {
    	marker = new L.circleMarker(e.latlng,{
            radius: 3,
            color: 'red',      
            fillColor: '#f03', 
            fillOpacity: 0.7   
        });
        map.addLayer(marker);
        lat += e.latlng.lat + ",";
        lng += e.latlng.lng + ",";
        document.getElementById('latitude').value = lat;
        document.getElementById('longitude').value = lng;
	}
    map.on('click', onMapClick);
</script>
    <h2>Add New Site</h2>
    <form action = "http://127.0.0.1:5000/addsite" method = "POST"> 
        <p>Name <input type = "text" name = "Name" /></p> 
        <p>Longitude <input type = "text" id="longitude" name = "Longitude" size="50"/></p> 
        <p>Latitude <input type = "text" id="latitude" name = "Latitude" size="50"/></p> 
        <p><input type = "submit" value = "submit" /></p> 
    </form> 
</body>
</html>
